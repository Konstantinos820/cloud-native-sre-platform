# templates/secret.yaml
#
# WEEK 2 ONLY: plaintext-in-Helm-values Secret, acceptable because this repo
# only ever targets a throwaway local Kind cluster. Week 3 swaps this for a
# Bitnami SealedSecret, which is safe to commit to a public GitHub repo
# because it can only be decrypted by the controller running inside the
# target cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-credentials
  labels:
    {{- include "sre-platform-app.postgresLabels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.credentials.database | quote }}
