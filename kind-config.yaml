# kind-config.yaml
#
# Single control-plane node "cluster" for local development.
# extraPortMappings expose host ports 80/443 straight into the Kind node,
# so that an Ingress Controller (added later) is reachable at
# http://localhost without any port-forwarding.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    # This label is what ingress-nginx's Kind-specific manifest looks for
    # to decide which node it's allowed to bind hostPorts on.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
