name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt

      - name: Run Black Formatter Check
        run: black --check app/src app/tests

      - name: Run Ruff Linter
        run: ruff check app/src app/tests

      - name: Run Pytest with Coverage
        run: |
          cd app
          python -m pytest --cov=src tests/ --cov-report=xml

      - name: Run Trivy FS Vulnerability Scan (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          format: 'table'
          exit-code: '1' # Θα κοκκινίσει το build αν βρει high/critical vulnerabilities
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  build-image:
    name: Build and Scan Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-qemu-action@v3

      - name: Build Local Image for Scanning
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          tags: sre-platform-api:test
          outputs: type=docker,dest=/tmp/image.tar

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          severity: 'HIGH,CRITICAL'
          format: 'table'
          exit-code: '1'