name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install black ruff pytest pytest-cov httpx

      - name: Run Black Formatter Check
        run: black --check app/src app/tests

      - name: Run Ruff Linter
        run: ruff check app/src app/tests

      - name: Run Pytest with Coverage
        run: |
          cd app
          pytest --cov=src --cov-report=xml tests/

      # 1. Εγκατάσταση του Trivy CLI
      - name: Install Trivy CLI
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 2. Σκανάρισμα του κώδικα απευθείας με Trivy CLI
      - name: Run Trivy FS Vulnerability Scan
        run: |
          trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed .

  build-image:
    name: Build and Scan Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image for Scanning
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          tags: sre-platform-api:test
          outputs: type=docker,dest=/tmp/image.tar

      # 1. Εγκατάσταση του Trivy CLI
      - name: Install Trivy CLI
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 2. Σκανάρισμα του παραγόμενου .tar image αρχείου
      - name: Run Trivy Image Scan
        run: |
          trivy image --input /tmp/image.tar --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --format table